apiVersion: 1

groups:
  - orgId: 1
    name: dell-me5-managed
    folder: Dell ME5
    interval: 1m
    rules:
      - uid: dell-me5-exporter-down
        title: "Dell ME5 exporter is down"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: ${GRAFANA_PROMETHEUS_DATASOURCE_UID}
            model:
              datasource:
                type: prometheus
                uid: ${GRAFANA_PROMETHEUS_DATASOURCE_UID}
              editorMode: code
              expr: 'up{job=~"dell.*me5.*|dell_me5_ssh_exporter"} == 0'
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              reducer: last
              refId: B
              settings:
                mode: dropNN
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              refId: C
              type: threshold
        noDataState: OK
        execErrState: Error
        for: 2m
        annotations:
          summary: "Dell ME5 exporter is down"
          description: "Prometheus cannot scrape Dell ME5 exporter on {{ $labels.instance }}."
        labels:
          severity: critical
        isPaused: false
